<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VidroLab</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0d0d0d; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .swiper { width: 100%; height: 100dvh; }
    .swiper-slide { display: flex; align-items: center; justify-content: center; background: #0d0d0d; }
    .swiper-slide img { display: block; max-width: 92%; max-height: 80%; width: auto; height: auto; object-fit: contain; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,.7); }
    .caption { position: absolute; bottom: 100px; left: 0; right: 0; text-align: center; color: #ccc; font-size: clamp(.9rem, 3vw, 1.3rem); font-weight: 400; letter-spacing: .04em; pointer-events: none; }
    .brand { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 20; background: rgba(255,255,255,.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); color: #fff; padding: 8px 24px; border-radius: 100px; font-size: clamp(.8rem, 2.5vw, 1rem); font-weight: 500; letter-spacing: .03em; white-space: nowrap; border: 1px solid rgba(255,255,255,.1); pointer-events: none; user-select: none; }
    .counter { position: fixed; bottom: 32px; right: 32px; z-index: 20; color: rgba(255,255,255,.5); font-size: clamp(.75rem, 2vw, .9rem); font-weight: 400; letter-spacing: .04em; pointer-events: none; user-select: none; }
    .swiper-button-next, .swiper-button-prev { color: #fff; background: rgba(255,255,255,.06); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); width: 44px; height: 44px; border-radius: 50%; transition: background .3s; }
    .swiper-button-next::after, .swiper-button-prev::after { font-size: 1rem; }
    .swiper-button-next:hover, .swiper-button-prev:hover { background: rgba(255,255,255,.15); }
    .swiper-button-next { right: 12px; }
    .swiper-button-prev { left: 12px; }
    .swiper-pagination { bottom: 60px !important; }
    .swiper-pagination-bullet { background: rgba(255,255,255,.3); opacity: 1; }
    .swiper-pagination-bullet-active { background: #fff; transform: scale(1.2); }
    @media (max-width: 600px) {
      .swiper-slide img { max-width: 96%; max-height: 70%; border-radius: 8px; }
      .swiper-button-next, .swiper-button-prev { width: 32px; height: 32px; }
      .swiper-button-next::after, .swiper-button-prev::after { font-size: .75rem; }
      .swiper-button-next { right: 6px; }
      .swiper-button-prev { left: 6px; }
      .caption { bottom: 76px; font-size: .85rem; }
      .brand { top: 16px; padding: 6px 18px; }
      .counter { bottom: 20px; right: 20px; }
      .swiper-pagination { bottom: 44px !important; }
      .swiper-pagination-bullet { width: 5px; height: 5px; }
    }
  </style>
</head>
<body>
  <div class="brand">Apresentamos o VidroLab:</div>
  <div class="counter" id="counter">1 / 11</div>
  <div class="swiper" id="swiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide">
        <img src="VidroLab.jpeg" alt="VidroLab" loading="eager">
        <div class="caption">VidroLab</div>
      </div>
      <div class="swiper-slide">
        <img src="Balão-Volumétrico.jpeg" alt="Balão Volumétrico" loading="eager">
        <div class="caption">Balão Volumétrico</div>
      </div>
      <div class="swiper-slide">
        <img src="Bastão-de-Vidro.jpeg" alt="Bastão de Vidro" loading="eager">
        <div class="caption">Bastão de Vidro</div>
      </div>
      <div class="swiper-slide">
        <img src="Béquer.jpeg" alt="Béquer" loading="eager">
        <div class="caption">Béquer</div>
      </div>
      <div class="swiper-slide">
        <img src="Erlenmeyer.jpeg" alt="Erlenmeyer" loading="eager">
        <div class="caption">Erlenmeyer</div>
      </div>
      <div class="swiper-slide">
        <img src="Funil-de-vidro.jpeg" alt="Funil de Vidro" loading="eager">
        <div class="caption">Funil de Vidro</div>
      </div>
      <div class="swiper-slide">
        <img src="Pipeta-Volumétrica.jpeg" alt="Pipeta Volumétrica" loading="eager">
        <div class="caption">Pipeta Volumétrica</div>
      </div>
      <div class="swiper-slide">
        <img src="Placa-De-Petri.jpeg" alt="Placa de Petri" loading="eager">
        <div class="caption">Placa de Petri</div>
      </div>
      <div class="swiper-slide">
        <img src="Proveita.jpeg" alt="Proveita" loading="eager">
        <div class="caption">Proveita</div>
      </div>
      <div class="swiper-slide">
        <img src="Tubo-De-Ensaio.jpeg" alt="Tubo de Ensaio" loading="eager">
        <div class="caption">Tubo de Ensaio</div>
      </div>
      <div class="swiper-slide">
        <img src="Vidro-De-Relogio.jpeg" alt="Vidro de Relógio" loading="eager">
        <div class="caption">Vidro de Relógio</div>
      </div>
    </div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const total = 11;
    const swiper = new Swiper('.swiper', {
      loop: false,
      speed: 500,
      navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
      pagination: { el: '.swiper-pagination', clickable: true },
      keyboard: { enabled: true },
      observer: true,
      observeParents: true,
      watchSlidesProgress: true,
      on: {
        slideChange: function () { document.getElementById('counter').textContent = (this.activeIndex + 1) + ' / ' + total; }
      }
    });
  </script>
</body>
</html>
